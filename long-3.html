<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ريّح بالك — Media Plus</title>
<style>
:root{--teal:#0f766e;--teal-d:#115e59;--teal-l:#ccfbf1;--teal-s:#f0fdfa;
  --red:#dc2626;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"Segoe UI",Tahoma,Arial,sans-serif;min-height:100dvh;color:var(--ink);
  background:radial-gradient(circle at 25% 12%,#14857a,#0c3d38 75%);
  display:flex;align-items:center;justify-content:center;padding:20px}
button{font-family:inherit;cursor:pointer;border:none;font-size:15px}
input{font-family:inherit;font-size:16px;padding:14px;border:1.5px solid var(--line);
  border-radius:13px;background:#fff;width:100%;color:var(--ink)}
input:focus{outline:none;border-color:var(--teal)}

.shell{width:430px;max-width:100%}
.logo{text-align:center;margin-bottom:22px;color:#fff}
.logo .mk{width:70px;height:70px;margin:0 auto 13px;background:rgba(255,255,255,.17);
  border-radius:22px;display:flex;align-items:center;justify-content:center}
.logo .mk svg{width:36px;height:36px;stroke:#fff;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.logo b{font-size:29px;font-weight:800;display:block;letter-spacing:-.5px}
.logo small{font-size:10.5px;opacity:.75;letter-spacing:3px;font-weight:700}

.card{background:#fff;border-radius:22px;padding:24px;box-shadow:0 24px 60px rgba(0,0,0,.32)}
.tabs{display:flex;background:#f1f5f9;border-radius:13px;padding:4px;margin-bottom:20px}
.tb{flex:1;padding:11px;border-radius:10px;font-weight:800;font-size:14px;
  background:none;color:var(--muted)}
.tb.on{background:#fff;color:var(--teal);box-shadow:0 1px 4px rgba(0,0,0,.09)}

.fld{margin-bottom:13px}
.fld label{display:block;font-size:12.5px;font-weight:800;margin-bottom:7px}
.fld .h{font-size:11px;color:var(--muted);margin-top:5px;font-weight:600}
.row{display:flex;gap:10px}
.row>div{flex:1}

.btn{background:var(--teal);color:#fff;width:100%;padding:16px;border-radius:14px;
  font-weight:800;font-size:16px;margin-top:8px}
.btn:active{background:var(--teal-d)}
.btn:disabled{opacity:.55}
.wa{background:#25d366;color:#fff;width:100%;padding:13px;border-radius:14px;
  font-weight:800;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.wa svg{width:18px;height:18px;stroke:#fff;stroke-width:2;fill:none}
.ghost{background:none;color:var(--muted);font-size:13px;font-weight:700;
  width:100%;padding:12px;margin-top:6px}

.err{color:var(--red);font-size:13.5px;font-weight:700;margin-top:14px;
  min-height:20px;text-align:center;line-height:1.7}
.ok{color:#15803d;font-size:13.5px;font-weight:700;margin-top:14px;text-align:center}

.dev{background:var(--teal-s);border:1.5px dashed var(--teal);border-radius:14px;
  padding:15px;text-align:center;margin-bottom:15px}
.dev small{font-size:11px;color:var(--muted);font-weight:800;display:block;
  margin-bottom:6px;letter-spacing:.5px}
.dev b{font-family:Consolas,monospace;font-size:17px;font-weight:800;color:var(--teal);letter-spacing:1px}
#akey{text-align:center;font-family:Consolas,monospace;font-size:19px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;padding:16px}
h2{font-size:19px;font-weight:800;margin-bottom:7px}
.sub{font-size:13px;color:var(--muted);line-height:1.85;margin-bottom:18px}
.hide{display:none}
.foot{text-align:center;color:rgba(255,255,255,.55);font-size:11px;margin-top:18px;font-weight:700}
</style>
</head>
<body>

<div class="shell">
  <div class="logo">
    <div class="mk"><svg viewBox="0 0 24 24">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      <path d="M9 7h7M9 11h5"/></svg></div>
    <b>ريّح بالك</b><small>MEDIA PLUS</small>
  </div>

  <!-- ══ الدخول / الإنشاء ══ -->
  <div class="card" id="cAuth">
    <div class="tabs">
      <button class="tb on" id="tLog" onclick="mode('log')">تسجيل الدخول</button>
      <button class="tb"    id="tReg" onclick="mode('reg')">حساب جديد</button>
    </div>

    <!-- دخول -->
    <div id="vLog">
      <div class="fld"><label>رقم الهاتف</label>
        <input id="l_phone" type="tel" dir="ltr" placeholder="0912345678"></div>
      <div class="fld"><label>كلمة المرور</label>
        <input id="l_pass" type="password"></div>
      <div class="fld"><label>مفتاح التفعيل</label>
        <input id="l_key" placeholder="MP-XXXX-XXXX" maxlength="12" spellcheck="false"
          style="text-align:center;font-family:Consolas,monospace;font-weight:800;letter-spacing:1.5px;text-transform:uppercase">
        <div class="h">مطلوب في كل تسجيل دخول جديد — نفس مفتاح حسابك</div></div>
      <button class="btn" id="bLog" onclick="doLogin()">دخول</button>
    </div>

    <!-- إنشاء -->
    <div id="vReg" class="hide">
      <div class="fld"><label>الاسم الثلاثي</label>
        <input id="r_name" placeholder="محمد علي الفيتوري"></div>
      <div class="row">
        <div class="fld"><label>المدينة</label><input id="r_city" placeholder="طرابلس"></div>
        <div class="fld"><label>المنطقة / الحي</label><input id="r_area" placeholder="سوق الجمعة"></div>
      </div>
      <div class="fld"><label>رقم الهاتف</label>
        <input id="r_phone" type="tel" dir="ltr" placeholder="0912345678">
        <div class="h">هذا رقمك للدخول — احفظه</div></div>
      <div class="fld"><label>كلمة المرور</label>
        <input id="r_pass" type="password">
        <div class="h">6 أحرف على الأقل</div></div>
      <button class="btn" id="bReg" onclick="doReg()">إنشاء الحساب</button>
    </div>

    <div class="err" id="e1"></div>
    <button class="wa" onclick="support()">
      <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      الدعم الفني
    </button>
  </div>

  <!-- ══ التفعيل ══ -->
  <div class="card hide" id="cKey">
    <h2>تفعيل الحساب</h2>
    <p class="sub">حسابك جاهز. أرسل رقم حسابك إلى Media Plus على واتساب لتحصل على مفتاح التفعيل.</p>
    <div class="dev"><small>رقم حسابك</small><b id="acc">—</b></div>
    <input id="akey" placeholder="MP-XXXX-XXXX" maxlength="12" spellcheck="false" autocomplete="off">
    <button class="btn" id="bAct" onclick="doActivate()">تفعيل</button>
    <button class="wa" onclick="askKey()">
      <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      طلب مفتاح على واتساب
    </button>
    <div class="err" id="e2"></div>
    <button class="ghost" onclick="logout()">تسجيل الخروج</button>
  </div>

  <div class="foot">Media Plus © 2026</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════
   ريّح بالك — صفحة الدخول والتفعيل

   • الحساب يُعرَّف برقم الهاتف (يُحوَّل داخلياً لبريد صناعي).
   • المفتاح يُربَط بالحساب لا بالجهاز → يفتح على جهازين.
   • كل تسجيل دخول جديد يطلب المفتاح. بلا مفتاح لا دخول.
   • بعد التفعيل، الجلسة تبقى — لا يُطلب الدخول مرة أخرى.
   ═══════════════════════════════════════════════════════════════ */

const SUPPORT='218920414760';       // رقم الدعم
const MAX_DEVICES=2;                // الحساب يفتح على جهازين

firebase.initializeApp({
  apiKey:"AIzaSyAvlQcNAaRVAbi0fKahb7kf1_EVU-f5Lqw",
  authDomain:"appdyon.firebaseapp.com",
  projectId:"appdyon",
  storageBucket:"appdyon.firebasestorage.app",
  messagingSenderId:"238284981505",
  appId:"1:238284981505:web:99fd2b75ed4f7c9b964700"
});
const auth=firebase.auth();
const db=firebase.firestore();
db.enablePersistence({synchronizeTabs:true}).catch(()=>{});

const $=id=>document.getElementById(id);

/* بصمة الجهاز */
function deviceId(){
  let d=localStorage.getItem('rb_dev');
  if(!d){
    const A='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    d='D'+Array.from({length:11},()=>A[Math.floor(Math.random()*A.length)]).join('');
    localStorage.setItem('rb_dev',d);
  }
  return d;
}
const DEV=deviceId();

/* رقم الهاتف → بريد صناعي (المستخدم لا يراه) */
const normPhone=p=>String(p||'').replace(/\D/g,'').replace(/^218/,'').replace(/^0/,'');
const toEmail=p=>'u'+normPhone(p)+'@rayyeh.app';

const ERR={
  'auth/invalid-email':'رقم الهاتف غير صحيح',
  'auth/email-already-in-use':'هذا الرقم مسجَّل بالفعل — سجّل الدخول',
  'auth/weak-password':'كلمة المرور قصيرة — 6 أحرف على الأقل',
  'auth/user-not-found':'هذا الرقم غير مسجَّل',
  'auth/wrong-password':'كلمة المرور خاطئة',
  'auth/invalid-credential':'الرقم أو كلمة المرور خاطئة',
  'auth/operation-not-allowed':'فعّل Email/Password في Firebase',
  'auth/network-request-failed':'لا يوجد اتصال بالإنترنت',
  'auth/too-many-requests':'محاولات كثيرة — انتظر قليلاً'
};
const say=(el,t)=>{ $(el).textContent=t; };

function mode(m){
  $('tLog').classList.toggle('on',m==='log');
  $('tReg').classList.toggle('on',m==='reg');
  $('vLog').classList.toggle('hide',m!=='log');
  $('vReg').classList.toggle('hide',m!=='reg');
  say('e1','');
}
function support(){
  const t='السلام عليكم\nأحتاج مساعدة في منظومة *ريّح بالك*';
  window.open(`https://wa.me/${SUPPORT}?text=${encodeURIComponent(t)}`,'_blank');
}
function askKey(){
  const u=auth.currentUser;
  const t=`السلام عليكم\nأريد مفتاح تفعيل منظومة *ريّح بالك*\nرقم حسابي: ${u?u.uid.slice(0,10).toUpperCase():'—'}`;
  window.open(`https://wa.me/${SUPPORT}?text=${encodeURIComponent(t)}`,'_blank');
}
function logout(){ auth.signOut().then(()=>location.reload()); }

/* ══ إنشاء حساب ══ */
async function doReg(){
  const b=$('bReg'); say('e1','');
  const name=$('r_name').value.trim();
  const city=$('r_city').value.trim();
  const area=$('r_area').value.trim();
  const phone=$('r_phone').value.trim();
  const pass=$('r_pass').value;

  if(name.split(/\s+/).length<3) return say('e1','اكتب الاسم الثلاثي كاملاً');
  if(!city)  return say('e1','اكتب المدينة');
  if(!area)  return say('e1','اكتب المنطقة أو الحي');
  if(normPhone(phone).length<9) return say('e1','رقم الهاتف غير صحيح');
  if(pass.length<6) return say('e1','كلمة المرور 6 أحرف على الأقل');

  b.disabled=true; b.textContent='جارٍ الإنشاء...';
  try{
    const cred=await auth.createUserWithEmailAndPassword(toEmail(phone),pass);
    await db.collection('users').doc(cred.user.uid).set({
      name, city, area, phone:normPhone(phone),
      key:'', devices:[], peopleCount:0, movesCount:0, totalDebt:0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastActive: firebase.firestore.FieldValue.serverTimestamp()
    });
    // ينتقل تلقائياً لشاشة المفتاح عبر onAuthStateChanged
  }catch(x){
    say('e1', ERR[x.code] || ('خطأ: '+x.code));
    b.disabled=false; b.textContent='إنشاء الحساب';
  }
}

/* ══ تسجيل الدخول — الهاتف + كلمة المرور + المفتاح ══ */
async function doLogin(){
  const b=$('bLog'); say('e1','');
  const phone=$('l_phone').value.trim();
  const pass=$('l_pass').value;
  const key=$('l_key').value.trim().toUpperCase();

  if(normPhone(phone).length<9) return say('e1','رقم الهاتف غير صحيح');
  if(!pass) return say('e1','اكتب كلمة المرور');
  if(!/^MP-[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(key)) return say('e1','صيغة مفتاح التفعيل غير صحيحة');

  b.disabled=true; b.textContent='جارٍ الدخول...';
  try{
    const cred=await auth.signInWithEmailAndPassword(toEmail(phone),pass);
    const uid=cred.user.uid;
    const ref=db.collection('users').doc(uid);
    const snap=await ref.get();
    const u=snap.data()||{};

    if(u.key && u.key!==key){
      await auth.signOut();
      throw new Error('مفتاح التفعيل لا يخص هذا الحساب');
    }
    if(!u.key){
      await bindKey(uid,key);     // أول تفعيل — يربط المفتاح بالحساب
    }
    await addDevice(ref,u);
    location.href='index.html';
  }catch(x){
    say('e1', ERR[x.code] || x.message || 'تعذّر الدخول');
    b.disabled=false; b.textContent='دخول';
  }
}

/* ══ تفعيل بعد الإنشاء ══ */
async function doActivate(){
  const b=$('bAct'); say('e2','');
  const key=$('akey').value.trim().toUpperCase();
  if(!/^MP-[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(key)) return say('e2','صيغة المفتاح غير صحيحة');

  const u=auth.currentUser;
  if(!u) return say('e2','انتهت الجلسة — أعد الدخول');

  b.disabled=true; b.textContent='جارٍ التحقق...';
  try{
    await bindKey(u.uid,key);
    const ref=db.collection('users').doc(u.uid);
    const s=await ref.get();
    await addDevice(ref,s.data()||{});
    location.href='index.html';
  }catch(x){
    say('e2', x.message || 'تعذّر التفعيل');
    b.disabled=false; b.textContent='تفعيل';
  }
}

/* ربط المفتاح بالحساب — يُقبل مرة واحدة */
async function bindKey(uid,key){
  const kref=db.collection('licenses').doc(key);
  const snap=await kref.get();
  if(!snap.exists) throw new Error('هذا المفتاح غير موجود');
  const k=snap.data();
  if(!k.active) throw new Error('هذا المفتاح موقوف — تواصل مع Media Plus');
  if(k.uid && k.uid!==uid) throw new Error('هذا المفتاح مستعمل في حساب آخر');

  await kref.update({
    used:true, uid,
    activatedAt: k.activatedAt || firebase.firestore.FieldValue.serverTimestamp()
  });
  // set + merge: يعمل حتى لو لم يكن المستند موجوداً
  await db.collection('users').doc(uid).set({key},{merge:true});
}

/* تسجيل الجهاز — بحد أقصى جهازين */
async function addDevice(ref,u){
  const list=u.devices||[];
  if(list.includes(DEV)) return;
  if(list.length>=MAX_DEVICES){
    await auth.signOut();
    throw new Error(`هذا الحساب مفتوح على ${MAX_DEVICES} أجهزة بالفعل — تواصل مع الدعم`);
  }
  await ref.set({
    devices: firebase.firestore.FieldValue.arrayUnion(DEV),
    lastActive: firebase.firestore.FieldValue.serverTimestamp()
  },{merge:true});
}

/* ══ توجيه تلقائي ══ */
auth.onAuthStateChanged(async u=>{
  if(!u){ $('cAuth').classList.remove('hide'); $('cKey').classList.add('hide'); return; }
  try{
    const s=await db.collection('users').doc(u.uid).get();
    // جلسة ليست لمستخدم (مثلاً حساب المدير في نفس المتصفح) → أنهِها
    if(!s.exists){
      await auth.signOut();
      $('cAuth').classList.remove('hide'); $('cKey').classList.add('hide');
      return;
    }
    const d=s.data()||{};
    if(d.key && (d.devices||[]).includes(DEV)){ location.href='index.html'; return; }
    // مسجَّل لكن غير مفعَّل → شاشة المفتاح
    $('cAuth').classList.add('hide');
    $('cKey').classList.remove('hide');
    $('acc').textContent=u.uid.slice(0,10).toUpperCase();
  }catch(e){
    $('cAuth').classList.remove('hide');
  }
});

if('serviceWorker' in navigator)
  navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
