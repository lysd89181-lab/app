<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ريّح بالك — Media Plus</title>
<style>
:root{--teal:#0f766e;--teal-d:#115e59;--teal-l:#ccfbf1;--teal-s:#f0fdfa;
  --red:#dc2626;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"Segoe UI",Tahoma,Arial,sans-serif;min-height:100dvh;color:var(--ink);
  background:radial-gradient(circle at 25% 12%,#14857a,#0c3d38 75%);
  display:flex;align-items:center;justify-content:center;padding:20px}
button{font-family:inherit;cursor:pointer;border:none;font-size:15px}
input{font-family:inherit;font-size:16px;padding:14px;border:1.5px solid var(--line);
  border-radius:13px;background:#fff;width:100%;color:var(--ink)}
input:focus{outline:none;border-color:var(--teal)}
.kin{text-align:center;font-family:Consolas,monospace;font-weight:800;
  letter-spacing:1.5px;text-transform:uppercase;font-size:17px}

.shell{width:430px;max-width:100%}
.logo{text-align:center;margin-bottom:20px;color:#fff}
.logo .mk{width:66px;height:66px;margin:0 auto 12px;background:rgba(255,255,255,.17);
  border-radius:21px;display:flex;align-items:center;justify-content:center}
.logo .mk svg{width:34px;height:34px;stroke:#fff;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.logo b{font-size:28px;font-weight:800;display:block;letter-spacing:-.5px}
.logo small{font-size:10.5px;opacity:.75;letter-spacing:3px;font-weight:700}

.card{background:#fff;border-radius:22px;padding:24px;box-shadow:0 24px 60px rgba(0,0,0,.32)}
.tabs{display:flex;background:#f1f5f9;border-radius:13px;padding:4px;margin-bottom:20px}
.tb{flex:1;padding:11px;border-radius:10px;font-weight:800;font-size:14px;
  background:none;color:var(--muted)}
.tb.on{background:#fff;color:var(--teal);box-shadow:0 1px 4px rgba(0,0,0,.09)}

.fld{margin-bottom:13px}
.fld label{display:block;font-size:12.5px;font-weight:800;margin-bottom:7px}
.fld .h{font-size:11px;color:var(--muted);margin-top:5px;font-weight:600;line-height:1.6}
.row{display:flex;gap:10px}
.row>div{flex:1}
.sep{border-top:1px solid var(--line);margin:18px 0 15px;position:relative}
.sep span{position:absolute;top:-9px;right:50%;transform:translateX(50%);background:#fff;
  padding:0 12px;font-size:11px;color:var(--muted);font-weight:800;letter-spacing:.5px}

.btn{background:var(--teal);color:#fff;width:100%;padding:16px;border-radius:14px;
  font-weight:800;font-size:16px;margin-top:8px}
.btn:active{background:var(--teal-d)}
.btn:disabled{opacity:.55}
.wa{background:#25d366;color:#fff;width:100%;padding:13px;border-radius:14px;
  font-weight:800;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.wa svg{width:18px;height:18px;stroke:#fff;stroke-width:2;fill:none}

.err{color:var(--red);font-size:13.5px;font-weight:700;margin-top:14px;
  min-height:20px;text-align:center;line-height:1.75}
.hide{display:none}
.foot{text-align:center;color:rgba(255,255,255,.55);font-size:11px;margin-top:16px;font-weight:700}
</style>
</head>
<body>

<div class="shell">
  <div class="logo">
    <div class="mk"><svg viewBox="0 0 24 24">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      <path d="M9 7h7M9 11h5"/></svg></div>
    <b>ريّح بالك</b><small>MEDIA PLUS</small>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tb on" id="tLog" onclick="mode('log')">تسجيل الدخول</button>
      <button class="tb"    id="tReg" onclick="mode('reg')">حساب جديد</button>
    </div>

    <!-- ══ دخول ══ -->
    <div id="vLog">
      <div class="fld"><label>رقم الهاتف</label>
        <input id="l_phone" type="tel" dir="ltr" placeholder="0912345678" autocomplete="username"></div>
      <div class="fld"><label>كلمة المرور</label>
        <input id="l_pass" type="password" autocomplete="current-password"></div>
      <div class="fld"><label>مفتاح التفعيل</label>
        <input id="l_key" class="kin" placeholder="MP-XXXX-XXXX-XXXX" maxlength="17" spellcheck="false" autocomplete="off">
        <div class="h">نفس مفتاح حسابك — مطلوب في كل دخول جديد</div></div>
      <button class="btn" id="bLog" onclick="doLogin()">دخول</button>
    </div>

    <!-- ══ إنشاء ══ -->
    <div id="vReg" class="hide">
      <div class="fld"><label>الاسم الثلاثي</label>
        <input id="r_name" placeholder="محمد علي الفيتوري"></div>
      <div class="row">
        <div class="fld"><label>المدينة</label><input id="r_city" placeholder="طرابلس"></div>
        <div class="fld"><label>المنطقة / الحي</label><input id="r_area" placeholder="سوق الجمعة"></div>
      </div>
      <div class="fld"><label>رقم الهاتف</label>
        <input id="r_phone" type="tel" dir="ltr" placeholder="0912345678">
        <div class="h">هذا رقمك للدخول — احفظه</div></div>
      <div class="fld"><label>كلمة المرور</label>
        <input id="r_pass" type="password">
        <div class="h">6 أحرف على الأقل</div></div>

      <div class="sep"><span>التفعيل</span></div>

      <div class="fld"><label>مفتاح التفعيل</label>
        <input id="r_key" class="kin" placeholder="MP-XXXX-XXXX-XXXX" maxlength="17" spellcheck="false" autocomplete="off">
        <div class="h">احصل عليه من Media Plus على واتساب</div></div>
      <button class="btn" id="bReg" onclick="doReg()">إنشاء الحساب وتفعيله</button>
    </div>

    <div class="err" id="err"></div>

    <button class="wa" onclick="support()">
      <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      طلب مفتاح · الدعم الفني
    </button>
  </div>

  <div class="foot">Media Plus © 2026</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════
   ريّح بالك — الدخول والإنشاء

   • المفتاح داخل نفس النموذج — لا شاشة منفصلة.
   • المفتاح يُربط بالحساب لا بالجهاز → يفتح على جهازين.
   • بلا مفتاح لا دخول إطلاقاً.
   • بعد الدخول تبقى الجلسة — لا يُطلب الدخول مجدداً.
   ═══════════════════════════════════════════════════════════════ */

const SUPPORT='218920414760';
const MAX_DEVICES=2;

firebase.initializeApp({
  apiKey:"AIzaSyAvlQcNAaRVAbi0fKahb7kf1_EVU-f5Lqw",
  authDomain:"appdyon.firebaseapp.com",
  projectId:"appdyon",
  storageBucket:"appdyon.firebasestorage.app",
  messagingSenderId:"238284981505",
  appId:"1:238284981505:web:99fd2b75ed4f7c9b964700"
});
const auth=firebase.auth();
const db=firebase.firestore();

const $=id=>document.getElementById(id);
const FV=firebase.firestore.FieldValue;

function deviceId(){
  let d=localStorage.getItem('rb_dev');
  if(!d){
    const A='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    d='D'+Array.from({length:11},()=>A[Math.floor(Math.random()*A.length)]).join('');
    localStorage.setItem('rb_dev',d);
  }
  return d;
}
const DEV=deviceId();

const normPhone=p=>String(p||'').replace(/\D/g,'').replace(/^218/,'').replace(/^0/,'');
const toEmail=p=>'u'+normPhone(p)+'@rayyeh.app';
/* يقبل صيغتَي المفتاح: كتلتين (قديم) أو ثلاث (جديد) */
const KEYRE=/^MP-[A-Z0-9]{4}-[A-Z0-9]{4}(-[A-Z0-9]{4})?$/;

const ERR={
  'auth/invalid-email':'رقم الهاتف غير صحيح',
  'auth/email-already-in-use':'هذا الرقم مسجَّل بالفعل — استعمل «تسجيل الدخول»',
  'auth/weak-password':'كلمة المرور قصيرة — 6 أحرف على الأقل',
  'auth/user-not-found':'هذا الرقم غير مسجَّل — أنشئ حساباً جديداً',
  'auth/wrong-password':'كلمة المرور خاطئة',
  'auth/invalid-credential':'الرقم أو كلمة المرور خاطئة',
  'auth/operation-not-allowed':'فعّل Email/Password في إعدادات Firebase',
  'auth/network-request-failed':'لا يوجد اتصال بالإنترنت',
  'auth/too-many-requests':'محاولات كثيرة — انتظر قليلاً',
  'permission-denied':'قواعد Firestore غير منشورة — راجع الدعم',
  'unavailable':'تعذّر الوصول للخادم — تحقق من الإنترنت'
};
const say=t=>{ $('err').textContent=t; };
const failMsg=x=> ERR[x.code] || x.message || 'حدث خطأ غير متوقع';

function mode(m){
  $('tLog').classList.toggle('on',m==='log');
  $('tReg').classList.toggle('on',m==='reg');
  $('vLog').classList.toggle('hide',m!=='log');
  $('vReg').classList.toggle('hide',m!=='reg');
  say('');
}
function support(){
  const t='السلام عليكم\nأريد مفتاح تفعيل منظومة *ريّح بالك*';
  window.open(`https://wa.me/${SUPPORT}?text=${encodeURIComponent(t)}`,'_blank');
}

/* تنسيق تلقائي للمفتاح أثناء الكتابة */
['l_key','r_key'].forEach(id=>{
  $(id).addEventListener('input',e=>{
    let v=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
    if(v.startsWith('MP')) v=v.slice(2);
    const b=v.match(/.{1,4}/g)||[];
    e.target.value = v ? 'MP-'+b.slice(0,3).join('-') : '';
  });
});

/* ══════════ إنشاء حساب + تفعيل في خطوة واحدة ══════════ */
async function doReg(){
  const b=$('bReg'); say('');
  const name=$('r_name').value.trim();
  const city=$('r_city').value.trim();
  const area=$('r_area').value.trim();
  const phone=$('r_phone').value.trim();
  const pass=$('r_pass').value;
  const key=$('r_key').value.trim().toUpperCase();

  if(name.split(/\s+/).filter(Boolean).length<3) return say('اكتب الاسم الثلاثي كاملاً');
  if(!city) return say('اكتب المدينة');
  if(!area) return say('اكتب المنطقة أو الحي');
  if(normPhone(phone).length<9) return say('رقم الهاتف غير صحيح');
  if(pass.length<6) return say('كلمة المرور 6 أحرف على الأقل');
  if(!KEYRE.test(key)) return say('صيغة مفتاح التفعيل غير صحيحة');

  b.disabled=true; b.textContent='جارٍ الإنشاء...';
  try{
    /* 1) نتحقق من المفتاح قبل إنشاء أي شيء */
    const ks=await db.collection('licenses').doc(key).get();
    if(!ks.exists) throw new Error('هذا المفتاح غير موجود');
    const k=ks.data();
    if(!k.active) throw new Error('هذا المفتاح موقوف — تواصل مع Media Plus');
    if(k.uid) throw new Error('هذا المفتاح مستعمل في حساب آخر');

    /* 2) ننشئ الحساب */
    const cred=await auth.createUserWithEmailAndPassword(toEmail(phone),pass);
    const uid=cred.user.uid;

    /* 3) نكتب بياناته ونربط المفتاح */
    await db.collection('users').doc(uid).set({
      name, city, area, phone:normPhone(phone),
      key, devices:[DEV],
      peopleCount:0, movesCount:0, totalDebt:0,
      createdAt: FV.serverTimestamp(),
      lastActive: FV.serverTimestamp()
    });
    await db.collection('licenses').doc(key).update({
      used:true, uid, activatedAt: FV.serverTimestamp()
    });

    location.href='index.html';
  }catch(x){
    say(failMsg(x));
    b.disabled=false; b.textContent='إنشاء الحساب وتفعيله';
  }
}

/* ══════════ تسجيل الدخول — هاتف + كلمة مرور + مفتاح ══════════ */
async function doLogin(){
  const b=$('bLog'); say('');
  const phone=$('l_phone').value.trim();
  const pass=$('l_pass').value;
  const key=$('l_key').value.trim().toUpperCase();

  if(normPhone(phone).length<9) return say('رقم الهاتف غير صحيح');
  if(!pass) return say('اكتب كلمة المرور');
  if(!KEYRE.test(key)) return say('صيغة مفتاح التفعيل غير صحيحة');

  b.disabled=true; b.textContent='جارٍ الدخول...';
  try{
    const cred=await auth.signInWithEmailAndPassword(toEmail(phone),pass);
    const uid=cred.user.uid;
    const ref=db.collection('users').doc(uid);
    const snap=await ref.get();
    const u=snap.exists ? snap.data() : null;

    if(!u){
      await auth.signOut();
      throw new Error('بيانات الحساب مفقودة — تواصل مع الدعم');
    }
    if(u.key && u.key!==key){
      await auth.signOut();
      throw new Error('هذا المفتاح لا يخص حسابك');
    }

    /* حساب قديم بلا مفتاح → نربطه الآن */
    if(!u.key){
      const ks=await db.collection('licenses').doc(key).get();
      if(!ks.exists){ await auth.signOut(); throw new Error('هذا المفتاح غير موجود'); }
      const k=ks.data();
      if(!k.active){ await auth.signOut(); throw new Error('هذا المفتاح موقوف'); }
      if(k.uid && k.uid!==uid){ await auth.signOut(); throw new Error('هذا المفتاح مستعمل في حساب آخر'); }
      await db.collection('licenses').doc(key).update({
        used:true, uid, activatedAt: k.activatedAt || FV.serverTimestamp()
      });
      await ref.set({key},{merge:true});
    }

    /* تسجيل الجهاز — بحدّ أقصى جهازين */
    const list=u.devices||[];
    if(!list.includes(DEV)){
      if(list.length>=MAX_DEVICES){
        await auth.signOut();
        throw new Error(`هذا الحساب مفتوح على ${MAX_DEVICES} أجهزة بالفعل — تواصل مع الدعم لتصفيرها`);
      }
      await ref.set({devices: FV.arrayUnion(DEV), lastActive: FV.serverTimestamp()},{merge:true});
    }else{
      await ref.set({lastActive: FV.serverTimestamp()},{merge:true});
    }

    location.href='index.html';
  }catch(x){
    say(failMsg(x));
    b.disabled=false; b.textContent='دخول';
  }
}

/* لو الجلسة قائمة ومفعّلة → ادخل مباشرة */
auth.onAuthStateChanged(async u=>{
  if(!u) return;
  try{
    const s=await db.collection('users').doc(u.uid).get();
    const d=s.exists?s.data():null;
    if(d && d.key && (d.devices||[]).includes(DEV)) location.href='index.html';
  }catch(e){}
});

if('serviceWorker' in navigator)
  navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
